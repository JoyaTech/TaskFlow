name: mindflow
description: "Hebrew-first task management and voice assistant app for users with ADHD"
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  speech_to_text: ^7.1.0
  sqflite: ^2.3.2
  shared_preferences: ^2.2.2
  http: ^1.2.1
  intl: ^0.20.0
  path: ^1.9.0
  firebase_core: ^2.25.4
  cloud_firestore: ^4.17.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true